<!DOCTYPE html>
<html>
<head>
  <style>
    :root { --primary: #004a99; --dir: #333; --mgr: #ffc107; --usr: #28a745; }
    body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); text-align: center; width: 350px; transition: 0.3s; }
    .logo { font-size: 26px; font-weight: bold; margin-bottom: 20px; color: var(--primary); }
    .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; color: white; transition: 0.2s; }
    
    /* Role Colors */
    .btn-dir { background: var(--dir); }
    .btn-mgr { background: var(--mgr); color: #333; }
    .btn-usr { background: var(--usr); }
    .btn-login { background: var(--primary); margin-top: 20px; }
    
    .hidden { display: none; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    .forgot { font-size: 12px; color: #666; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>

  <div id="step1" class="card">
    <div class="logo">Estimation Pro</div>
    <p>Select your position to continue:</p>
    <button class="btn btn-dir" onclick="chooseRole('Director')">Director</button>
    <button class="btn btn-mgr" onclick="chooseRole('Manager')">Manager</button>
    <button class="btn btn-usr" onclick="chooseRole('User')">User</button>
  </div>

  <div id="step2" class="card hidden">
    <div id="selectedRoleHeader" style="font-weight:bold; margin-bottom:10px;"></div>
    <input type="email" id="emailInput" placeholder="Email ID">
    <input type="password" id="passInput" placeholder="Password (12345)">
    <button class="btn btn-login" onclick="verifyLogin()">Login</button>
    <p class="forgot" onclick="alert('Contact System Admin to reset password.')">Forgot Password?</p>
    <button class="btn" style="background:#ccc; color:black; padding:8px;" onclick="goBack()">Back</button>
  </div>

  <div id="step3" class="card hidden" style="width: 80%; max-width:600px;">
    <h2 id="welcomeMsg"></h2>
    <p>You have successfully logged into the system.</p>
    <button class="btn btn-login" onclick="location.reload()">Logout</button>
  </div>

<script>
  let selectedRole = "";

  function chooseRole(role) {
    selectedRole = role;
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('selectedRoleHeader').innerText = "Logging in as: " + role;
  }

  function goBack() {
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
  }

  function verifyLogin() {
    const email = document.getElementById('emailInput').value;
    const pass = document.getElementById('passInput').value;

    if (!email) { alert("Please enter Email"); return; }
    if (pass !== "12345") { alert("Incorrect Password!"); return; }

    // Check if this email exists in our Google Sheet with the right role
    google.script.run.withSuccessHandler(function(response) {
      if (response.success) {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        document.getElementById('welcomeMsg').innerText = "Welcome, " + response.name;
      } else {
        alert("Access Denied: Email not found for " + selectedRole + " position.");
      }
    }).checkUserAccess(email, selectedRole);
  }
</script>
</body>
</html>
