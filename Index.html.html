<!DOCTYPE html>
<html>
<head>
  <style>
    :root { --primary: #004a99; --success: #28a745; --warning: #ffc107; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
    .logo { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
    .user-info { margin-bottom: 20px; color: #666; font-size: 14px; }
    .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; text-decoration: none; }
    .btn-maker { background: var(--primary); color: white; }
    .btn-reviewer { background: var(--warning); color: #333; }
    .btn-admin { background: #333; color: white; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo">🧩 Estimation Pro</div>
  <p id="welcomeMsg">Checking credentials...</p>
  <div id="userEmail" class="user-info"></div>

  <div id="menuOptions">
    <button id="btnUser" class="btn btn-maker hidden" onclick="location.href='#'">Start New Estimate</button>
    <button id="btnManager" class="btn btn-reviewer hidden" onclick="location.href='#'">Review Pending Jobs</button>
    <button id="btnDirector" class="btn btn-admin hidden" onclick="location.href='#'">Director Dashboard</button>
  </div>
  
  <button class="btn" style="background:#ddd" onclick="google.script.host.close()">Exit System</button>
</div>

<script>
  // When the page loads, ask Google who this user is
  window.onload = function() {
    google.script.run.withSuccessHandler(showMenu).getUserRole();
  };

  function showMenu(user) {
    if (user.role === "Guest") {
      document.getElementById('welcomeMsg').innerHTML = "⚠️ Access Denied. Contact Admin.";
      return;
    }

    document.getElementById('welcomeMsg').innerHTML = "Welcome back, <b>" + user.name + "</b>";
    document.getElementById('userEmail').innerText = user.email + " (" + user.role + ")";

    // Logic to show buttons based on role
    if (user.role === "User" || user.role === "Director") {
      document.getElementById('btnUser').classList.remove('hidden');
    }
    if (user.role === "Manager" || user.role === "Director") {
      document.getElementById('btnManager').classList.remove('hidden');
    }
    if (user.role === "Director") {
      document.getElementById('btnDirector').classList.remove('hidden');
    }
  }
</script>

</body>
</html>
